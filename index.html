<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="TileMap Studio — A powerful browser-based tilemap editor for 2D game development" />
  <title>TileMap Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>
<body>
  <div id="app">
    <!-- HEADER TOOLBAR -->
    <header id="header" class="header">
      <div class="header__left">
        <button id="sidebar-toggle" class="header__btn header__menu-btn" title="Toggle Tileset Panel">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button id="project-name-btn" class="header__project-name" title="Project Settings">
          <span id="project-name-text">Untitled Project</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div class="header__tools" id="toolbar">
        <button class="tool-btn" data-tool="dragdrop" title="Drag &amp; Drop Placement (D)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 5V3a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2h-2"/><rect x="3" y="11" width="10" height="10" rx="2"/></svg>
        </button>
        <button class="tool-btn active" data-tool="pencil" title="Pencil (P)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
        </button>
        <button class="tool-btn" data-tool="bucket" title="Bucket Fill (B)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"/><path d="m5 2 5 5"/><path d="M2 13h15"/><path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.7 2-4 .3 1.3 2 2.4 2 4Z"/></svg>
        </button>
        <button class="tool-btn" data-tool="selection" title="Selection (S)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/></svg>
        </button>
        <button class="tool-btn" data-tool="move" title="Move / Pan (M)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
        </button>
        <div class="tool-separator"></div>
        <button class="tool-btn" id="undo-btn" title="Undo (Ctrl+Z)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <button class="tool-btn" id="redo-btn" title="Redo (Ctrl+Y)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
        </button>
      </div>
      <div class="header__right">
        <!-- Selection context button — shown only when selection is active -->
        <div id="selection-actions" class="selection-actions" style="display:none;">
          <button id="selection-delete-btn" class="header__btn selection-btn selection-btn--danger" title="Delete Selection (Del)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
          <div class="tool-separator"></div>
        </div>
        <button id="zoom-out-btn" class="header__btn" title="Zoom Out">−</button>
        <span id="zoom-level" class="header__zoom">100%</span>
        <button id="zoom-in-btn" class="header__btn" title="Zoom In">+</button>
        <div class="tool-separator"></div>
        <!-- Layers toggle button -->
        <button id="layers-toggle" class="header__btn" title="Toggle Layers Panel">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          <span class="btn-label">Layers</span>
        </button>
        <div class="tool-separator"></div>
        <button id="export-btn" class="header__btn" title="Export">
          ↓ <span class="btn-label">Export</span>
        </button>
      </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div id="main" class="main">
      <!-- SIDEBAR BACKDROP (mobile) -->
      <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
      <!-- LAYERS DRAWER BACKDROP (mobile) -->
      <div id="layers-backdrop" class="sidebar-backdrop"></div>

      <!-- LEFT SIDEBAR (tileset only) -->
      <aside id="sidebar" class="sidebar">
        <!-- TILESET PANEL -->
        <div class="panel tileset-panel" id="tileset-panel">
          <div class="tileset-panel__content" id="tileset-content">
            <div class="tileset-panel__dropzone" id="tileset-dropzone">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
              <p>Drop tileset here<br/><span>or click Import below</span></p>
            </div>
            <div class="tileset-panel__canvas-wrap" id="tileset-canvas-wrap" style="display:none;">
              <canvas id="tileset-canvas"></canvas>
              <canvas id="tileset-selection-canvas" style="pointer-events:auto;"></canvas>
            </div>
          </div>
          <!-- Tileset Canvas Toolbar (for mobile + convenience) -->
          <div class="tileset-toolbar" id="tileset-toolbar" style="display:none;">
            <div class="tileset-workspace-switcher">
              <button class="tileset-toolbar__btn tileset-toolbar__btn--wide" id="tileset-workspace-btn" title="Switch asset canvas">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="6" rx="1"/><rect x="3" y="14" width="18" height="6" rx="1"/></svg>
                <span id="tileset-workspace-name">Canvas 1</span>
              </button>
              <div class="tileset-workspace-menu" id="tileset-workspace-menu">
                <div class="tileset-workspace-menu__list" id="tileset-workspace-list"></div>
                <button class="tileset-workspace-menu__create" id="tileset-workspace-create" type="button">+ New canvas</button>
              </div>
            </div>
            <button class="tileset-toolbar__btn active" data-ts-tool="select" title="Select tiles">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
            </button>
            <button class="tileset-toolbar__btn" data-ts-tool="pan" title="Pan / Move around">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
            </button>
            <button class="tileset-toolbar__btn" data-ts-tool="zoom-in" title="Zoom In">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </button>
            <button class="tileset-toolbar__btn" data-ts-tool="zoom-out" title="Zoom Out">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </button>
            <button class="tileset-toolbar__btn" data-ts-tool="delete" title="Delete selected tileset">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
          <button class="tileset-import-btn" id="add-tileset-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            Import tileset
          </button>
        </div>
      </aside>

      <!-- CANVAS AREA -->
      <div id="canvas-container" class="canvas-container">
        <canvas id="tilemap-canvas"></canvas>
        <div id="canvas-coords" class="canvas-coords">0, 0</div>
      </div>

      <!-- RIGHT LAYERS DRAWER -->
      <aside id="layers-drawer" class="layers-drawer closed">
        <div class="layers-drawer__header">
          <span class="layers-drawer__title">Layers</span>
          <div class="layers-drawer__actions">
            <button id="layer-action-add" class="layer-header-btn" title="Add Layer">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button id="layer-action-duplicate" class="layer-header-btn" title="Duplicate Layer">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button id="layer-action-up" class="layer-header-btn" title="Move Layer Up">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
            <button id="layer-action-down" class="layer-header-btn" title="Move Layer Down">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <button id="layer-action-delete" class="layer-header-btn layer-header-btn--danger" title="Delete Layer">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
            <div class="layer-header-sep"></div>
            <button id="layers-drawer-close" class="layer-header-btn" title="Close Layers">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        <ul class="layers-list" id="layers-list"></ul>
        <div class="layers-footer">
          <button class="layers-footer__btn" id="add-layer-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Layer
          </button>
        </div>
      </aside>
    </div>

    <!-- MOBILE BOTTOM TOOLBAR -->
    <div id="mobile-toolbar" class="mobile-toolbar">
      <button class="mobile-tool-btn active" data-tool="pencil" title="Pencil">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
      </button>
      <button class="mobile-tool-btn" data-tool="eraser" title="Eraser">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
      </button>
      <button class="mobile-tool-btn" data-tool="bucket" title="Fill">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"/><path d="m5 2 5 5"/><path d="M2 13h15"/><path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.7 2-4 .3 1.3 2 2.4 2 4Z"/></svg>
      </button>
      <button class="mobile-tool-btn" data-tool="selection" title="Select">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/></svg>
      </button>
      <button class="mobile-tool-btn" data-tool="dragdrop" title="Drag &amp; Drop">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 5V3a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2h-2"/><rect x="3" y="11" width="10" height="10" rx="2"/></svg>
      </button>
    </div>

    <!-- PROJECT SETTINGS PANEL -->
    <div id="project-modal" class="modal-overlay" style="display:none;">
      <div class="project-panel">
        <div class="project-panel__header">
          <h2 class="project-panel__title">Project</h2>
          <button id="project-modal-close" class="project-panel__close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="project-panel__body">
          <div class="form-group">
            <label for="setting-name">Name</label>
            <input type="text" id="setting-name" class="form-input" value="Untitled Project" />
          </div>
          <div class="form-group">
            <label for="setting-description">Description</label>
            <textarea id="setting-description" class="form-input" rows="3" placeholder="Optional project description..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="setting-tile-size">Tile size</label>
              <input type="number" id="setting-tile-size" class="form-input" value="16" min="4" max="128" />
            </div>
            <div class="form-group">
              <label for="setting-grid-color">Grid background color (hex)</label>
              <input type="text" id="setting-grid-color" class="form-input" value="#000000" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="setting-map-width">Map Width (tiles)</label>
              <input type="number" id="setting-map-width" class="form-input" value="40" min="1" max="1000" />
            </div>
            <div class="form-group">
              <label for="setting-map-height">Map Height (tiles)</label>
              <input type="number" id="setting-map-height" class="form-input" value="30" min="1" max="1000" />
            </div>
          </div>
          <div class="form-group--checkbox">
            <label><input type="checkbox" id="setting-grid-visible" checked /> <span>Show grid</span></label>
          </div>
        </div>
        <div class="project-panel__footer">
          <button id="project-modal-apply" class="btn">OK</button>
          <button id="project-new-btn" class="btn btn--icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            New
          </button>
          <button id="project-save-btn" class="btn btn--icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save
          </button>
          <button id="project-load-btn" class="btn btn--icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Load
          </button>
        </div>
      </div>
    </div>

    <!-- EXPORT MODAL -->
    <div id="export-modal" class="modal-overlay" style="display:none;">
      <div class="modal">
        <div class="modal__header">
          <h2 class="modal__title">Export</h2>
          <button id="export-modal-close" class="modal__close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal__body">
          <div class="export-grid">
            <button class="export-option" id="export-png">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
              <span>PNG Image</span>
            </button>
            <button class="export-option" id="export-json">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              <span>JSON Data</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- HIDDEN FILE INPUTS -->
    <input type="file" id="tileset-file-input" accept="image/*" style="display:none;" />
    <input type="file" id="project-load-input" accept=".json" style="display:none;" />
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
